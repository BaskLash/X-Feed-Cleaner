<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Customizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        [data-bs-theme="dark"] {
            --bs-body-bg: #000000;
            --bs-body-color: #e7e9ea;
            --bs-border-color: #2f3336;
        }
        body {
            width: 380px;
            background-color: #000000;
        }
        .form-check-input:checked {
            background-color: #1d9bf0;
            border-color: #1d9bf0;
        }
        .form-check-input:focus {
            box-shadow: 0 0 0 0.2rem rgba(29, 155, 240, 0.25);
            border-color: #1d9bf0;
        }
        #extensionEnabled.form-check-input:checked {
            background-color: #1d9bf0;
            border-color: #1d9bf0;
        }
    </style>
</head>
<body class="p-3">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between border-bottom pb-3 mb-3">
        <h5 class="mb-0 fw-bold text-white">X Customizer</h5>
        <div class="d-flex align-items-center gap-2">
            <label class="form-check-label small text-secondary" for="extensionEnabled">Extension</label>
            <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" role="switch" id="extensionEnabled" checked>
            </div>
        </div>
    </div>

    <!-- Feed Section -->
    <div class="mb-3">
        <p class="text-uppercase fw-bold mb-2" style="font-size: 0.65rem; letter-spacing: 1px; color: #71767b;">Feed</p>
        <div class="row g-2">
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="autoFollowing">
                    <label class="form-check-label small" for="autoFollowing">Auto "Following"</label>
                </div>
            </div>
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hideReposts">
                    <label class="form-check-label small" for="hideReposts">Hide Reposts</label>
                </div>
            </div>
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hideNewPosts">
                    <label class="form-check-label small" for="hideNewPosts">Hide "New posts"</label>
                </div>
            </div>
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hidePremiumBanner">
                    <label class="form-check-label small" for="hidePremiumBanner">Hide Premium</label>
                </div>
            </div>
        </div>
    </div>

    <hr class="my-2">

    <!-- Navigation Section -->
    <div class="mb-3">
        <p class="text-uppercase fw-bold mb-2" style="font-size: 0.65rem; letter-spacing: 1px; color: #71767b;">Navigation</p>
        <div class="row g-2">
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hideNotifications">
                    <label class="form-check-label small" for="hideNotifications">Notifications</label>
                </div>
            </div>
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hideExplore">
                    <label class="form-check-label small" for="hideExplore">Explore</label>
                </div>
            </div>
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hideGrok">
                    <label class="form-check-label small" for="hideGrok">Grok</label>
                </div>
            </div>
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hidePremiumNav">
                    <label class="form-check-label small" for="hidePremiumNav">Premium</label>
                </div>
            </div>
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hideFollow">
                    <label class="form-check-label small" for="hideFollow">Follow</label>
                </div>
            </div>
        </div>
    </div>

    <hr class="my-2">

    <!-- Sidebar Section -->
    <div class="mb-3">
        <p class="text-uppercase fw-bold mb-2" style="font-size: 0.65rem; letter-spacing: 1px; color: #71767b;">Sidebar</p>
        <div class="row g-2">
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hideTrends">
                    <label class="form-check-label small" for="hideTrends">Trends</label>
                </div>
            </div>
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hideLive">
                    <label class="form-check-label small" for="hideLive">Live on X</label>
                </div>
            </div>
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="hideCommunitySuggestions">
                    <label class="form-check-label small" for="hideCommunitySuggestions">Suggestions</label>
                </div>
            </div>
        </div>
    </div>

    <hr class="my-2">

    <!-- UI Section -->
    <div class="mb-3">
        <p class="text-uppercase fw-bold mb-2" style="font-size: 0.65rem; letter-spacing: 1px; color: #71767b;">UI</p>
        <div class="row g-2">
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="removeTitleCounter">
                    <label class="form-check-label small" for="removeTitleCounter">No Notif. Counter</label>
                </div>
            </div>
            <div class="col-6">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="dimMode">
                    <label class="form-check-label small" for="dimMode">Dim Mode</label>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="border-top pt-3 mt-1">
        <div class="d-flex justify-content-between mb-2">
            <a href="https://github.com/BaskLash/X-Feed-Cleaner/issues" target="_blank"
               class="text-decoration-none small" style="color: #71767b;">Bugs / Features</a>
            <a href="https://github.com/BaskLash/X-Feed-Cleaner" target="_blank"
               class="text-decoration-none small" style="color: #71767b;">GitHub</a>
        </div>
        <a href="https://chromewebstore.google.com/detail/x-customizer/biiehfmkkfdbklplegkpfombnbpijolj" target="_blank" class="text-decoration-none">
            <button class="btn btn-sm w-100 text-white fw-bold" style="background-color: #1d9bf0; border: none; border-radius: 20px;">&#11088; Rate this Extension</button>
        </a>
        <p class="text-center mt-2 mb-0" id="nameYear" style="font-size: 0.65rem; color: #71767b;"></p>
    </div>

    <script src="popup.js" defer></script>
    <script src="getCurrentYear.js" defer></script>
</body>
</html>
